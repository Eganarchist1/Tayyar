name: Hero Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/hero-app/**"
      - "packages/types/**"
      - "packages/utils/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/hero-android-apk.yml"
      - ".github/scripts/**"

jobs:
  build-hero-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    env:
      HERO_APP_API_URL: ${{ secrets.HERO_APP_API_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android toolchain
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.1.13356709"

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Write native build config
        run: |
          API_URL="${HERO_APP_API_URL:-http://84.8.249.193:3001}"
          cat <<EOF > apps/hero-app/lib/build-config.ts
          export const heroBuildConfig = {
            apiUrl: "${API_URL}",
            appVersion: "1.1.0",
            appName: "Tayyar Hero",
          } as const;
          EOF

      - name: Make Gradle wrapper executable
        working-directory: apps/hero-app/android
        run: chmod +x ./gradlew

      - name: Build Android release APK
        working-directory: apps/hero-app/android
        run: ./gradlew clean assembleRelease --console=plain

      - name: Boot emulator and smoke test release launch
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: bash .github/scripts/hero-apk-smoke.sh

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tayyar-hero-smoke-evidence
          path: |
            hero-ui.xml
            hero-launch.png
            hero-logcat.txt
            hero-pid.txt
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tayyar-hero-release-apk
          path: apps/hero-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
