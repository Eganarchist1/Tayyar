apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def reactNativePackagePath = ["node", "--print", "require.resolve('react-native/package.json')"]
    .execute(null, rootDir)
    .text
    .trim()
def reactNativePath = new File(reactNativePackagePath).getParentFile().getAbsoluteFile()
def codegenPackagePath = ["node", "--print", "require.resolve('@react-native/codegen/package.json')"]
    .execute(null, rootDir)
    .text
    .trim()
def codegenPath = new File(codegenPackagePath).getParentFile().getAbsoluteFile()

react {
    entryFile = file("../../index.js")
    reactNativeDir = reactNativePath
    hermesCommand = reactNativePath.getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = codegenPath

    enableBundleCompression = (findProperty("android.enableBundleCompression") ?: false).toBoolean()
    autolinkLibrariesWithApp()
}

def enableMinifyInReleaseBuilds = (findProperty("android.enableMinifyInReleaseBuilds") ?: false).toBoolean()
def jscFlavor = "io.github.react-native-community:jsc-android:2026004.+"

android {
    ndkVersion "28.1.13356709"
    buildToolsVersion "36.0.0"
    compileSdk 36

    namespace "com.tayyar.hero"

    defaultConfig {
        applicationId "com.tayyar.hero"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 2
        versionName "1.1.0"

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty("reactNativeReleaseLevel") ?: "stable"}\""
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs true
        }
    }

    packagingOptions {
        resources {
            excludes += ["/META-INF/{AL2.0,LGPL2.1}"]
        }
    }

    androidResources {
        ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~"
    }
}

["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",")
    for (i in 0..<options.size()) options[i] = options[i].trim()
    options -= ""

    if (options.length > 0) {
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    implementation("androidx.core:core-splashscreen:1.0.1")
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
